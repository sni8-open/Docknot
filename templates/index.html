{% extends "base.html" %}
{% block content %}
<div class="row g-3">
  <div class="col-lg-4">
    <div class="card shadow-sm">
      <div class="card-body">
        <h5 class="card-title">Create Group</h5>
        <form method="post" action="{{ url_for('groups_create') }}">
          <div class="mb-3">
            <label class="form-label">Group name</label>
            <input name="name" class="form-control" placeholder="e.g., Statistics" />
          </div>
          <button class="btn btn-primary w-100">Create</button>
        </form>
        <div class="small text-muted mt-3">
          Each group has its own PDFs, vectors, and chat history.
        </div>
      </div>
    </div>
  </div>

  <div class="col-lg-8">
    <div class="card shadow-sm">
      <div class="card-body">
        <h5 class="card-title">Groups</h5>
        {% if groups %}
          <div class="list-group">
            {% for g in groups %}
              <a class="list-group-item list-group-item-action d-flex justify-content-between align-items-center"
                 href="{{ url_for('group_page', group_id=g.id) }}">
                {{ g.name }}
                <span class="badge bg-secondary">Open</span>
              </a>
            {% endfor %}
          </div>
        {% else %}
          <p class="text-muted mb-0">No groups yet. Create one.</p>
        {% endif %}
      </div>
    </div>
  </div>
</div>
{% endblock %}
